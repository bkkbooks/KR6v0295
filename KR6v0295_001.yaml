body:
  text: 興聖寺主諸葛始興左葙都維那王仕力金剛主王始都維那曜鋒將軍諸葛元偘大齋主薛文宜大碑主諸葛惡大碑主比丘智贇大齋主羊吉大齋主王伯姿大齋主諸葛玉羅大齋主王妙大像主張溫釗冕孫曇鳳南堪主張豹光明主比丘道景佐葙菩薩主孫胡酋孫胡猥右葙菩薩主王群虎師子龍王主元葦子笒子珍子建繼祖寶塔主真儒僧究都維那行臺下都軍長史王元誕右葙都維那王道度大齊武平三年歲次壬辰三月朔八日庚戌若夫玄旨深邃妙迹難尋沖寂迥非聖不會是以大慈潛影於鵠林銀姿金聲流而於東注自非高之何能在度錄威顏刊刑真狀哉然今都維那王子虎高高等乃是爵寵皇望葩後魏鄉中頃盡封邑瑯琊郡此雖薰世榮不以官祿為勝寤中存福境是故率領道俗邑卌人敬造四面石碑像一區抽蕑金田置在伽藍之所其勢也前河汜於韓信之路郤背狐三峰而岝出左帶流泉右俠萇路此處忽然新佛化生地中湧出石乃名山匠手斑妙三十二相常住八十種好不絕乃使在家菩薩藥樹仙人稱歌詠正觀者而皈矚者滅惡而去定知三途芒然無蹤七處八會斑有跡彩素精鮮好異禽異獸難名者多雜花飛童槃龍郊吐但福不獨積以備有形運此勝因仰願國祚延隆昂藏不絕七世存亡恒為勝樂法界眾生高栖十地一時作佛比丘僧比丘道德比丘僧究維那新安郡二正郡公曹虛比丘智贇比丘法比丘進世
